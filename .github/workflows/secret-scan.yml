name: secret-scan

on:
  push:
    branches: [main]
  pull_request:

jobs:
  paths-and-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Block patient corpus paths
        run: |
          set -euo pipefail
          if git ls-files 'structured_database/*' | grep -v 'structured_database/README.md'; then
            echo "Patient corpus files must not be in the public repo"
            exit 1
          fi
          for f in bot_config.json .env; do
            if git ls-files "$f" 2>/dev/null | grep -q .; then
              echo "Blocked file in repo: $f"
              exit 1
            fi
          done

      - name: Block known leaked PHI patterns
        run: |
          set -euo pipefail
          patterns=(
            '7752900844000725'
            'Алексей Юрьевич'
            '20\.03\.1985'
            'Подобедов'
          )
          for pat in "${patterns[@]}"; do
            if git grep -E "$pat" -- ':!scripts/check_safe_to_push.py' ':!.github/workflows/secret-scan.yml'; then
              echo "Blocked PHI pattern in repo: $pat"
              exit 1
            fi
          done

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
